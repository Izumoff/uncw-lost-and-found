<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Lost & Found - Staff Edit Report Content</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-semibold" href="index.html">Campus Lost &amp; Found</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-review.html">Staff Review</a></li>
          <li class="nav-item"><a class="nav-link active" href="staff-edit-report.html">Edit Content</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-change-status.html">Change Status</a></li>
          <li class="nav-item"><a class="nav-link" href="staff-close-report.html">Close Reports</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="py-5">
    <div class="container">
      <div class="card shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center">
          <h1 class="h4 mb-0">Edit Report Content</h1>
          <span class="badge text-bg-dark">Security Office Staff</span>
        </div>
        <div class="card-body">
          <form class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Report ID</label>
              <input type="text" class="form-control" value="RPT-1001" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label">Submitted By</label>
              <input type="text" class="form-control" value="student01@uncw.edu" disabled>
            </div>
            <div class="col-md-6">
              <label class="form-label">Item Name</label>
              <input type="text" class="form-control" value="Black Wallet">
            </div>
            <div class="col-md-6">
              <label class="form-label">Location</label>
              <input type="text" class="form-control" value="Library, 1st Floor, Near Front Desk">
            </div>
            <div class="col-12">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="4">Black leather wallet with student ID and two cards. Updated by staff for clarity and policy-compliant language.</textarea>
            </div>
            <div class="col-12">
              <label class="form-label">Staff Edit Note</label>
              <textarea class="form-control" rows="3" placeholder="Reason for edit (clarity, accuracy, policy compliance)"></textarea>
            </div>
            <div class="col-12 d-flex gap-2">
              <button type="button" class="btn btn-primary">Save Content Changes</button>
              <a href="staff-review.html" class="btn btn-outline-secondary">Back to Review</a>
            </div>
          </form>
        </div>
        <div class="card-footer bg-white">
          <div class="alert alert-info mb-0">
            Staff may edit report content to improve clarity, accuracy, and policy compliance.
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 bg-white border-top">
    <div class="container text-secondary small">Campus Lost &amp; Found Prototype - Sprint 2</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
