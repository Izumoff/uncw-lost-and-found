{# app/templates/app/admin_console.html #}

{% extends "app/layout.html" %}

{% block content %}
<h2>{{ title }}</h2>

<div class="panel panel-default">
    <div class="panel-heading">
        <strong>Admin Console</strong>
    </div>
    <div class="panel-body">

        <p>
            Use the options below to manage the system.
        </p>

        <hr>

        <div style="margin-bottom:15px;">
            <a href="{% url 'admin_reports' %}" class="btn btn-primary">
                View All Reports
            </a>
        </div>

        <div style="margin-bottom:15px;">
            <a href="{% url 'admin_users' %}" class="btn btn-primary">
                Manage Users &amp; Roles
            </a>
        </div>

        <div style="margin-bottom:15px;">
            <a href="{% url 'admin_activity' %}" class="btn btn-primary">
                System Activity
            </a>
        </div>

        <div>
            <a href="{% url 'admin_usage_monitoring' %}" class="btn btn-primary">
                Usage Monitoring
            </a>
        </div>

    </div>
</div>

{% endblock %}
